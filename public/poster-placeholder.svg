<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" viewBox="0 0 300 450">
  <rect width="300" height="450" fill="#2a2a2a"/>
  <!-- Film strip notches top -->
  <rect x="20" y="16" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="60" y="16" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="100" y="16" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="140" y="16" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="180" y="16" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="220" y="16" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="260" y="16" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <!-- Film strip notches bottom -->
  <rect x="20" y="414" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="60" y="414" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="100" y="414" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="140" y="414" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="180" y="414" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="220" y="414" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <rect x="260" y="414" width="28" height="20" rx="3" fill="#3a3a3a"/>
  <!-- Camera body -->
  <rect x="95" y="185" width="110" height="75" rx="8" fill="#444"/>
  <!-- Camera lens outer -->
  <circle cx="150" cy="222" r="28" fill="#333"/>
  <!-- Camera lens inner -->
  <circle cx="150" cy="222" r="18" fill="#222"/>
  <circle cx="150" cy="222" r="8" fill="#1a1a1a"/>
  <!-- Camera flash -->
  <rect x="170" y="188" width="22" height="14" rx="3" fill="#555"/>
  <!-- No Image text -->
  <text x="150" y="300" font-family="sans-serif" font-size="16" fill="#555" text-anchor="middle">No Image</text>
</svg>
